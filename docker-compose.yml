services:
  postgres:
    image: supabase/postgres:15.1.0.117
    container_name: nutri-fit-postgres
    ports:
      - "54322:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword123
      JWT_SECRET: super-secret-jwt-token-for-dev-12345678
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/z_init.sql:/docker-entrypoint-initdb.d/z_init.sql
      - ./docker/postgres/zz_exercises_seed.sql:/docker-entrypoint-initdb.d/zz_exercises_seed.sql
      - ./docker/postgres/zzz_auth_rls.sql:/docker-entrypoint-initdb.d/zzz_auth_rls.sql
      - ./docker/postgres/zzzz2_routines.sql:/docker-entrypoint-initdb.d/zzzz2_routines.sql
      - ./docker/postgres/zzzz3_meal_plans.sql:/docker-entrypoint-initdb.d/zzzz3_meal_plans.sql
      - ./docker/postgres/zzzz4_cardio_and_weight.sql:/docker-entrypoint-initdb.d/zzzz4_cardio_and_weight.sql
      - ./docker/postgres/zzzz5_food_catalog.sql:/docker-entrypoint-initdb.d/zzzz5_food_catalog.sql
    networks:
      - nutrifit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nutri-fit-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:devpassword123@postgres:5432/postgres
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      PORT: 8000
      # --- Capa de IA multi-proveedor (F8) ---
      # Claves opcionales por defecto; el cliente puede enviar la suya por request.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # base_url de servidores locales del host (LM Studio / vLLM)
      LMSTUDIO_URL: ${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      VLLM_URL: ${VLLM_URL:-http://host.docker.internal:8000/v1}
    extra_hosts:
      # permite al contenedor alcanzar servidores de IA que corren en el host
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nutrifit-network

  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: nutri-fit-postgrest
    expose:
      - "3000"
    environment:
      PGRST_DB_URI: postgresql://postgres:devpassword123@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public,nutrition,training
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: super-secret-jwt-token-for-dev-12345678
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nutrifit-network

  auth:
    image: supabase/gotrue:v2.151.0
    container_name: nutri-fit-auth
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:54321/auth/v1
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:devpassword123@postgres:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: http://localhost:8080
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: super-secret-jwt-token-for-dev-12345678
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_HOST: mailpit
      GOTRUE_SMTP_PORT: "1025"
      GOTRUE_SMTP_USER: "test"
      GOTRUE_SMTP_PASS: "test"
      GOTRUE_SMTP_SENDER_NAME: "Nutri-Fit"
      GOTRUE_SMTP_ADMIN_EMAIL: "no-reply@nutrifit.local"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - nutrifit-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: nutri-fit-mailpit
    ports:
      - "8025:8025"  # UI web + API REST
      - "1025:1025"  # SMTP
    networks:
      - nutrifit-network

  gateway:
    image: nginx:alpine
    container_name: nutri-fit-gateway
    ports:
      - "54321:80"
    volumes:
      - ./docker/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - postgrest
      - auth
    networks:
      - nutrifit-network

networks:
  nutrifit-network:
    driver: bridge

volumes:
  postgres_data:
