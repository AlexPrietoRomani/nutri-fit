services:
  postgres:
    image: supabase/postgres:15.1.0.117
    container_name: nutri-fit-postgres
    ports:
      - "54322:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword123
      JWT_SECRET: super-secret-jwt-token-for-dev-12345678
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/z_init.sql:/docker-entrypoint-initdb.d/z_init.sql
    networks:
      - nutrifit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nutri-fit-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:devpassword123@postgres:5432/postgres
      OLLAMA_HOST: http://ollama:11434
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nutrifit-network

  ollama:
    image: ollama/ollama:latest
    container_name: nutri-fit-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - nutrifit-network

  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: nutri-fit-postgrest
    ports:
      - "54321:3000"
    environment:
      PGRST_DB_URI: postgresql://postgres:devpassword123@postgres:5432/postgres
      PGRST_DB_SCHEMAS: public,nutrition,training
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: super-secret-jwt-token-for-dev-12345678
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nutrifit-network

networks:
  nutrifit-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
