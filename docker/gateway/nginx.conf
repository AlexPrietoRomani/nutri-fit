events { worker_connections 1024; }

http {
    server {
        listen 80;

        location /rest/v1/ {
            # ── CORS: headers en TODAS las respuestas de este location ──
            # 'always' asegura que se añadan incluso en respuestas de error
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'authorization,content-type,apikey,x-client-info,prefer,accept,accept-profile,content-profile' always;
            add_header 'Access-Control-Expose-Headers' 'content-range,x-supabase-api-version' always;

            # ── Preflight OPTIONS: responder inmediatamente sin ir a PostgREST ──
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH';
                add_header 'Access-Control-Allow-Headers' 'authorization,content-type,apikey,x-client-info,prefer,accept,accept-profile,content-profile';
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # ── Ocultar los CORS que emite PostgREST para no duplicarlos ──
            # (si no, el cliente recibe 'Access-Control-Allow-Origin: *, *' y lo rechaza)
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            proxy_hide_header 'Access-Control-Expose-Headers';

            # ── Proxy a PostgREST ──
            proxy_pass http://postgrest:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth/v1/ {
            # ── CORS: headers en TODAS las respuestas de este location ──
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'authorization,content-type,apikey,x-client-info,prefer,accept,accept-profile,content-profile' always;
            add_header 'Access-Control-Expose-Headers' 'content-range,x-supabase-api-version' always;

            # ── Preflight OPTIONS: responder inmediatamente sin ir a GoTrue ──
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH';
                add_header 'Access-Control-Allow-Headers' 'authorization,content-type,apikey,x-client-info,prefer,accept,accept-profile,content-profile';
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # ── Ocultar los CORS que emite GoTrue para no duplicarlos ──
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            proxy_hide_header 'Access-Control-Expose-Headers';

            # ── Proxy a GoTrue (recorta el prefijo /auth/v1/) ──
            proxy_pass http://auth:9999/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cualquier otra ruta devuelve 404 explícito
        location / {
            return 404 '{"message":"Not Found"}';
            add_header 'Content-Type' 'application/json' always;
        }
    }
}
